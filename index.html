<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js Másodfokú egyenlet megoldó | Fru Huszar</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="index.js"></script>
    <script type="module" src="teszt.js"></script>
  </head>
  <body>
    <main>
      <section>
        <article>
          <h1>Másodfokú egyenlet gyökeit kiszámoló program</h1>
          <p>Ax² + Bx + C = 0</p>
          <p>Kérem a három együtthatót:</p>
          <div class="form-group">
              <label for="a">A = </label>
              <input type="number" name="a" id="a" /><br />
          </div>
          <div class="form-group">
              <label for="b">B = </label>
              <input type="number" name="b" id="b" /><br />
          </div>
          <div class="form-group">
              <label for="c">C = </label>
              <input type="number" name="c" id="c" /><br />
          </div>
              <button id="gomb">Számolás</button>
          <div class="form-group">
              <label for="x1">X1 = </label>
              <input type="text" name="x1" id="x1" value="?" /><br />
          </div>
          <div class="form-group">
              <label for="x2">X2 = </label>
              <input type="text" name="x2" id="x2" value="?" />
          </div>
          <button type="reset">Újra</button>
        </article>
      </section>
    </main>
  </body>
</html>
